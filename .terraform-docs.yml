formatter: "markdown"

version: ""

header-from: main.tf
footer-from: ""

recursive:
  enabled: false
  path: modules
  include-main: true

sections:
  hide: []
  show: []

content: ""

output:
  file: "README.md"
  mode: inject
  template: |-
    <!-- prettier-ignore-start -->
    <!-- BEGIN_TF_DOCS -->\n
    {{ .Content }}\n
    <!-- END_TF_DOCS -->
    <!-- prettier-ignore-end -->

output-values:
  enabled: false
  from: ""

sort:
  enabled: true
  by: required

settings:
  anchor: true
  color: true
  default: true
  description: false
  escape: true
  hide-empty: true
  html: true
  indent: 2
  lockfile: false # .terraform.lock.hcl を参照しない
  read-comments: true
  required: true
  sensitive: true
  type: true
