---
# https://pre-commit.com/
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: e05c5c0818279e5ac248ac9e954431ba58865e61  # frozen: v0.15.7
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: d0e12caebb2ab0ee8bf98181c8bfe9702bca103d  # frozen: v1.105.0
    hooks:
      - id: terraform_fmt
        exclude: |
          (?x)^(
            backup/[\d|\w|_]+\/(.*?)|
            .config/tfstyle/(.*?).tf
          )$
      - id: terraform_validate
        exclude: |
          (?x)^(
            backup/[\d|\w|_]+\/(.*?)|
            .config/tfstyle/(.*?).tf
          )$
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
        exclude: |
          (?x)^(
            backup/[\d|\w|_]+\/(.*?)|
            .config/tfstyle/(.*?).tf
          )$
      - id: terraform_docs
        args:
          - "--args=--lockfile=false"
          - "--args=--config=.terraform-docs.yml"
        exclude: |
          (?x)^(
            backup/[\d|\w|_]+\/(.*?)|
            .config/tfstyle/(.*?).tf
          )$

  - repo: https://github.com/pre-commit/pre-commit-hooks.git
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-json
        exclude: |
          (?x)^(
            backup/[\d|\w|_]+\/(.*?)|
            docs/nodejs/ts_tutorial/tsconfig.json|
            path/to/file3.json
          )$
      - id: check-yaml
        args:
          - --allow-multiple-documents
      - id: check-toml
      - id: check-xml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/rhysd/actionlint
    rev: 393031adb9afb225ee52ae2ccd7a5af5525e03e8  # frozen: v1.7.11
    hooks:
      - id: actionlint

  - repo: https://github.com/jackdewinter/pymarkdown
    rev: 6d3c1b70d44ea2202b23552af93aca3b5017ee83  # frozen: v0.9.36
    hooks:
      - id: pymarkdown
        args:
          - --config=.config/.pymarkdown.yaml
          - scan
        exclude: |
          (?x)^(
            backup/[\d|\w|_]+\/(.*?)|
            path/to/file3.py
          )$

  - repo: https://github.com/adrienverge/yamllint.git
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        args:
          - -c=.config/.yamllint

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 91ab4bf57e58b32adf1a122681f6ebe164d081c8  # frozen: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
